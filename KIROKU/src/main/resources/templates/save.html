<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 작성</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="content-box">

    <div class="page-header">
        <div>
            <h2 class="page-title">글 작성</h2>
            <p class="page-subtitle">새 일기를 등록해보세요.</p>
        </div>

        <div style="display:flex; gap:8px;">
            <a class="btn btn-secondary" href="/board/">📋 목록</a>
        </div>
    </div>

    <form action="/board/save" method="post" class="form-box">

        <div class="form-group">
            <label>제목</label>
            <input type="text" name="boardTitle" placeholder="제목 입력" required>
        </div>

        <div class="form-group">
            <label>내용</label>
            <textarea name="boardContents" rows="10" placeholder="내용을 입력하세요" required></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">등록</button>
            <a class="btn btn-secondary" href="/board/">취소</a>
        </div>

    </form>

</div>

</body>
</html>

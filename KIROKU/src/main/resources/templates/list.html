<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="content-box">

    <div class="page-header">
        <div>
            <h2 class="page-title">📖 일기장</h2>
            <p class="page-subtitle">오늘의 기록을 차곡차곡 쌓아가세요.</p>
        </div>

        <div style="display:flex; gap:8px;">
            <a class="btn btn-primary" th:href="@{/board/save}">✏ 글 작성</a>
            <a class="btn btn-secondary" th:href="@{/logout}">로그아웃</a>
        </div>
    </div>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <table class="table-list">
        <thead>
        <tr>
            <th style="width:90px;">ID</th>
            <th>제목</th>
            <th style="width:140px;">작성자</th>
            <th style="width:160px;">작성일</th>
            <th style="width:90px;">조회수</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="board : ${boardList}">
            <td><span class="badge" th:text="${board.id}"></span></td>
            <td>
                <a class="title-link"
                   th:href="@{/board/{id}(id=${board.id})}"
                   th:text="${board.boardTitle}"></a>
            </td>
            <td th:text="${board.boardWriter}"></td>
            <td th:text="${board.boardCreatedAt}"></td>
            <td th:text="${board.boardHits}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(boardList)}">
            <td class="empty-row" colspan="5">아직 작성된 글이 없어요. “글 작성”으로 첫 글을 작성해보자!</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>

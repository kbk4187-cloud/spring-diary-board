

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="content-box">

    <div class="page-header">
        <div>
            <h2 class="page-title">글 수정</h2>
            <p class="page-subtitle">내용을 수정하고 저장하세요.</p>
        </div>

        <div style="display:flex; gap:8px;">
            <a class="btn btn-secondary" href="/board/">📋 목록</a>
            <a class="btn btn-secondary" th:href="@{/board/{id}(id=${board.id})}">↩ 상세</a>
        </div>
    </div>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form action="/board/update" method="post" class="form-box" name="updateForm">

        <input type="hidden" name="id" th:value="${board.id}">

        <div class="form-group">
            <label>제목</label>
            <input type="text" name="boardTitle" th:value="${board.boardTitle}" required>
        </div>

        <div class="form-group">
            <label>내용</label>
            <textarea name="boardContents" rows="10" required
                      th:text="${board.boardContents}"></textarea>
        </div>

        <div class="btn-group">
            <a class="btn btn-secondary" href="/board/">취소</a>
            <button type="submit" class="btn btn-primary">저장</button>
        </div>

    </form>
</div>

</body>
</html>

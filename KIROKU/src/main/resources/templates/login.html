<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>로그인</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ✅ 일기장 느낌 헤드라인 + 로그인 카드 아래로 -->
<div class="auth-wrap">

    <div class="auth-hero">
        <h1 class="auth-title">당신의 하루를 기록하세요</h1>
        <p class="auth-desc">오늘의 감정, 생각, 그리고 작은 성취까지. 나만의 일기장에 남겨보세요.</p>
    </div>

    <div class="content-box auth-card">
        <h2 style="margin-top:0;">로그인</h2>

        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>

        <form action="/login" method="post" class="form-box">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">로그인</button>
        </form>

        <div class="auth-footer">
            <span>아직 계정이 없나요?</span>
            <a href="/signup">회원가입</a>
        </div>
    </div>

</div>

</body>
</html>

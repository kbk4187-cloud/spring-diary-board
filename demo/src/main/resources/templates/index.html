<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="content-box">

    <div class="page-header">
        <div>
            <h2 class="page-title">게시글 목록</h2>
            <p class="page-subtitle">지금까지 작성한 글을 한 눈에 확인할 수 있어요.</p>
        </div>
        <a class="btn-link" th:href="@{/board/save}">✏ 글 작성</a>
    </div>

    <table class="table-list">
        <thead>
        <tr>
            <th style="width:90px;">ID</th>
            <th>제목</th>
            <th style="width:140px;">작성자</th>
            <th style="width:160px;">작성일</th>
            <th style="width:90px;">조회수</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="board : ${boardList}">
            <td><span class="badge" th:text="${board.id}"></span></td>
            <td>
                <a class="title-link"
                   th:href="@{/board/{id}(id=${board.id})}"
                   th:text="${board.boardTitle}"></a>
            </td>
            <td th:text="${board.boardWriter}"></td>
            <td th:text="${board.boardCreatedAt}"></td>
            <td th:text="${board.boardHits}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(boardList)}">
            <td class="empty-row" colspan="5">아직 작성된 글이 없어요. “글 작성”으로 첫 글을 작성해보자!</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
